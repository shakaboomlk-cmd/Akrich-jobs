<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Your Vacancy - LankaJobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .slide-up { animation: slideUp 0.4s ease-out; }
        .accent-rose { accent-color: #e11d48; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 font-sans selection:bg-rose-200 selection:text-rose-900 min-h-screen flex flex-col">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex-shrink-0 flex items-center cursor-pointer group">
                        <div class="w-10 h-10 bg-rose-600 rounded-lg flex items-center justify-center mr-2 group-hover:bg-rose-700 transition-colors">
                            <i data-lucide="briefcase" class="text-white w-6 h-6"></i>
                        </div>
                        <span class="font-bold text-2xl text-slate-800 tracking-tight">Lanka<span class="text-rose-600">Jobs</span></span>
                    </a>
                </div>
                <div class="hidden md:flex sm:items-center sm:space-x-4">
                    <a href="index.html" class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 hover:text-rose-600 hover:bg-rose-50 transition-colors">Home</a>
                    <a href="postyourvacancy.html" class="px-3 py-2 rounded-md text-sm font-bold text-rose-600 bg-rose-50 transition-colors">Post Your Vacancy</a>
                    <a href="contactus.html" class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 hover:text-rose-600 hover:bg-rose-50 transition-colors">Contact Us</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-1 pb-12 pt-8 max-w-5xl mx-auto px-4 w-full slide-up">
        <div class="bg-blue-50 border border-blue-200 p-6 rounded-2xl mb-8 flex items-start gap-4 shadow-sm">
            <div class="bg-blue-100 p-3 rounded-xl hidden sm:block">
                <i data-lucide="megaphone" class="w-6 h-6 text-blue-700"></i>
            </div>
            <div>
                <h3 class="text-lg font-bold text-blue-900 mb-1">topAd Package</h3>
                <p class="text-blue-800 text-sm">Attach your artwork and enter details below to publish your vacancy directly to Supabase.</p>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden mb-10">
            <div class="bg-gradient-to-r from-slate-800 to-slate-900 p-8 text-white text-center border-b-4 border-rose-600">
                <h2 class="text-3xl font-bold mb-2 tracking-tight">Publish Your Vacancy</h2>
            </div>
            
            <form id="job-form" class="p-6 sm:p-10 space-y-10">
                <section>
                    <h3 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2 border-b border-gray-200 pb-3">Client Info</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="flex flex-col md:col-span-2">
                            <label class="text-sm font-semibold text-slate-700 mb-1">Company Name *</label>
                            <input type="text" id="companyName" required class="px-4 py-3 bg-slate-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-rose-500 outline-none">
                        </div>
                        <div class="flex flex-col">
                            <label class="text-sm font-semibold text-slate-700 mb-1">Contact Email *</label>
                            <input type="email" id="clientEmail" required class="px-4 py-3 bg-slate-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-rose-500 outline-none">
                        </div>
                        <div class="flex flex-col">
                            <label class="text-sm font-semibold text-slate-700 mb-1">Contact Number *</label>
                            <input type="tel" id="contactNumber" required class="px-4 py-3 bg-slate-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-rose-500 outline-none">
                        </div>
                    </div>
                </section>

                <section>
                    <h3 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2 border-b border-gray-200 pb-3">Job Details</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="flex flex-col md:col-span-2">
                            <label class="text-sm font-semibold text-slate-700 mb-1">Position *</label>
                            <input type="text" id="position" required class="px-4 py-3 bg-slate-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-rose-500 outline-none">
                        </div>
                        <div class="flex flex-col">
                            <label class="text-sm font-semibold text-slate-700 mb-1">Job Category *</label>
                            <select id="jobCategory" required class="px-4 py-3 bg-slate-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-rose-500 outline-none">
                                <option value="">Select</option>
                                <option value="Engineering">Engineering</option>
                                <option value="Sales">Sales</option>
                                <option value="Marketing">Marketing</option>
                                <option value="Administration">Administration</option>
                                <option value="IT & Software">IT & Software</option>
                            </select>
                        </div>
                        <div class="flex flex-col">
                            <label class="text-sm font-semibold text-slate-700 mb-3">Job Type *</label>
                            <div class="flex flex-wrap gap-4 bg-slate-50 p-4 border border-gray-200 rounded-xl">
                                <label class="flex items-center gap-2 text-sm"><input type="radio" name="jobType" value="Full Time" checked class="accent-rose"> Full Time</label>
                                <label class="flex items-center gap-2 text-sm"><input type="radio" name="jobType" value="Part Time" class="accent-rose"> Part Time</label>
                            </div>
                        </div>
                        <div class="flex flex-col md:col-span-2">
                            <label class="text-sm font-semibold text-slate-700 mb-1">Vacancy Summary *</label>
                            <textarea id="vacancySummary" required rows="4" class="px-4 py-3 bg-slate-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-rose-500 outline-none"></textarea>
                        </div>
                        <div class="flex flex-col md:col-span-2">
                            <label class="text-sm font-semibold text-slate-700 mb-1">Artwork File (Optional, max 750KB)</label>
                            <input type="file" id="artworkFiles" class="px-4 py-3 bg-slate-50 border border-gray-200 rounded-xl outline-none">
                        </div>
                    </div>
                </section>

                <section>
                    <h3 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2 border-b border-gray-200 pb-3">Routing</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="flex flex-col">
                            <label class="text-sm font-semibold text-slate-700 mb-1">App URL Link</label>
                            <input type="url" id="appLink" class="px-4 py-3 bg-slate-50 border border-gray-200 rounded-xl outline-none">
                        </div>
                        <div class="flex flex-col">
                            <label class="text-sm font-semibold text-slate-700 mb-1">Destination Email *</label>
                            <input type="email" id="destinationEmail" required class="px-4 py-3 bg-slate-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-rose-500 outline-none">
                        </div>
                    </div>
                </section>

                <div class="pt-2 flex justify-end">
                    <button type="submit" id="submit-btn" class="w-full md:w-auto px-12 py-4 rounded-xl bg-rose-600 text-white font-bold text-lg hover:bg-rose-700 shadow-lg shadow-rose-600/30 transition-all">Submit Vacancy</button>
                </div>
            </form>
        </div>
    </main>

    <div id="toast" class="hidden fixed bottom-6 right-6 z-[60] flex items-center gap-3 text-white px-6 py-4 rounded-xl shadow-2xl transition-all">
        <i id="toast-icon" data-lucide="check-circle" class="w-6 h-6"></i><span id="toast-message" class="font-medium">Message</span>
    </div>

    <script>
        const SUPABASE_URL = 'https://cezyaulwgrgxyjhwyptk.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_qslhNTtJ4ZEPooWM3s4c8g_ri8s_OGi';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        lucide.createIcons();

        const showToast = (message, type = 'success') => {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').innerText = message;
            document.getElementById('toast-icon').setAttribute('data-lucide', type === 'success' ? 'check-circle' : 'alert-triangle');
            toast.className = `fixed bottom-6 right-6 z-[60] flex items-center gap-3 px-6 py-4 rounded-xl shadow-2xl slide-up ${type==='success'?'bg-emerald-600':'bg-rose-600'} text-white`;
            lucide.createIcons();
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 5000);
        };

        const readFileAsBase64 = (file) => {
            return new Promise((resolve, reject) => {
                if (!file) { resolve(null); return; }
                if (file.size > 768000) { reject(new Error("File too large. Max 750KB.")); return; }
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = (error) => reject(error);
                reader.readAsDataURL(file);
            });
        };

        document.getElementById('job-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerHTML = 'Processing...'; btn.disabled = true;

            try {
                let artworkBase64 = null;
                const fileInput = document.getElementById('artworkFiles');
                if(fileInput.files.length > 0) {
                    artworkBase64 = await readFileAsBase64(fileInput.files[0]);
                }

                const vacancyData = {
                    companyName: document.getElementById('companyName').value,
                    clientEmail: document.getElementById('clientEmail').value,
                    contactNumber: document.getElementById('contactNumber').value,
                    position: document.getElementById('position').value,
                    jobCategory: document.getElementById('jobCategory').value,
                    jobType: document.querySelector('input[name="jobType"]:checked').value,
                    vacancySummary: document.getElementById('vacancySummary').value,
                    applicationLink: document.getElementById('appLink').value || null,
                    destinationEmail: document.getElementById('destinationEmail').value,
                    status: 'pending_review'
                };

                const { data, error } = await supabase.from('ackrich-jobs').insert([vacancyData]).select();
                if (error) throw error;
                const newId = data[0].id;

                if (artworkBase64) {
                    const { error: fileErr } = await supabase.from('vacancy_files').insert([{
                        vacancyId: newId,
                        fileType: 'Artwork',
                        fileName: fileInput.files[0].name,
                        fileData: artworkBase64
                    }]);
                    if(fileErr) console.log("File insertion note:", fileErr.message);
                }
                
                showToast("Vacancy Submitted to Supabase Successfully!");
                e.target.reset();
            } catch (error) {
                console.error(error);
                showToast("Failed to submit. " + error.message, "error");
            } finally {
                btn.innerHTML = 'Submit Vacancy'; btn.disabled = false;
            }
        });
    </script>
</body>
</html>
