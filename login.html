<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LankaJobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes slideUp { 
            from { transform: translateY(20px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 font-sans selection:bg-rose-200 selection:text-rose-900 min-h-screen flex flex-col relative overflow-x-hidden">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm relative">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex-shrink-0 flex items-center cursor-pointer group">
                        <div class="w-10 h-10 bg-rose-600 rounded-lg flex items-center justify-center mr-2 group-hover:bg-rose-700 transition-colors shadow-sm">
                            <i data-lucide="briefcase" class="text-white w-6 h-6"></i>
                        </div>
                        <span class="font-bold text-2xl text-slate-800 tracking-tight">Lanka<span class="text-rose-600">Jobs</span></span>
                    </a>
                </div>
                <div class="hidden md:flex sm:items-center sm:space-x-4">
                    <a href="index.html" class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 hover:text-rose-600 hover:bg-rose-50 transition-colors">Home</a>
                    <a href="post_vacancy.html" class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 hover:text-rose-600 hover:bg-rose-50 transition-colors">Post Your Vacancy</a>
                    <a href="contactus.html" class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 hover:text-rose-600 hover:bg-rose-50 transition-colors">Contact Us</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center p-4 py-12 relative z-10">
        
        <!-- Decorative Background Elements -->
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-rose-100 blur-[100px] opacity-60 z-0"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-blue-100 blur-[100px] opacity-60 z-0"></div>

        <div class="w-full max-w-md bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden slide-up relative z-10">
            
            <div class="p-8 sm:p-10">
                <div class="text-center mb-8">
                    <div class="w-16 h-16 bg-rose-100 text-rose-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-sm border border-rose-200">
                        <i data-lucide="lock-keyhole" class="w-8 h-8"></i>
                    </div>
                    <h2 id="form-title" class="text-2xl font-bold text-slate-900 tracking-tight mb-1">Welcome Back</h2>
                    <p id="form-subtitle" class="text-sm text-slate-500">Sign in to manage your vacancy postings</p>
                </div>
                
                <form id="auth-form" class="space-y-5">
                    <div class="space-y-1">
                        <label for="email" class="text-sm font-semibold text-slate-700">Email Address</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i data-lucide="mail" class="w-5 h-5 text-slate-400"></i>
                            </div>
                            <input type="email" id="email" required placeholder="you@company.com" 
                                class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-rose-500 outline-none transition-all placeholder:text-slate-400 text-slate-700 font-medium">
                        </div>
                    </div>
                    
                    <div class="space-y-1">
                        <div class="flex items-center justify-between">
                            <label for="password" class="text-sm font-semibold text-slate-700">Password</label>
                            <a href="#" id="forgot-password-link" class="text-xs font-medium text-rose-600 hover:text-rose-700 transition-colors">Forgot password?</a>
                        </div>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i data-lucide="key-round" class="w-5 h-5 text-slate-400"></i>
                            </div>
                            <input type="password" id="password" required placeholder="••••••••" minlength="6"
                                class="w-full pl-11 pr-12 py-3 bg-slate-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-rose-500 outline-none transition-all placeholder:text-slate-400 text-slate-700 font-medium">
                            <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600 transition-colors">
                                <i data-lucide="eye" id="eye-icon" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" id="submit-btn" class="w-full py-3.5 mt-2 rounded-xl bg-rose-600 text-white font-bold text-base hover:bg-rose-700 shadow-lg shadow-rose-600/20 transition-all flex items-center justify-center gap-2">
                        <span id="btn-text">Sign In</span>
                        <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </button>
                </form>

                <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                    <p class="text-sm text-slate-600">
                        <span id="toggle-text">Don't have an account?</span> 
                        <button type="button" id="toggle-mode-btn" class="font-bold text-rose-600 hover:text-rose-700 transition-colors ml-1 focus:outline-none focus:underline">
                            Sign up
                        </button>
                    </p>
                </div>
            </div>
            
            <!-- Loading Overlay -->
            <div id="loading-overlay" class="hidden absolute inset-0 bg-white/80 backdrop-blur-sm flex-col items-center justify-center z-20 fade-in">
                <i data-lucide="loader-2" class="w-10 h-10 text-rose-600 animate-spin mb-3"></i>
                <p class="text-sm font-semibold text-slate-700">Authenticating...</p>
            </div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="hidden fixed bottom-6 right-6 z-[60] flex items-start gap-3 text-white px-6 py-4 rounded-xl shadow-2xl transition-all max-w-sm">
        <div class="mt-0.5">
            <i id="toast-icon" data-lucide="check-circle" class="w-5 h-5"></i>
        </div>
        <span id="toast-message" class="font-medium text-sm leading-snug">Message</span>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        // Initialize Supabase Client
        const SUPABASE_URL = 'https://cezyaulwgrgxyjhwyptk.supabase.co';
        const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_qslhNTtJ4ZEPooWM3s4c8g_ri8s_OGi';
        const supabase = createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);
        
        // Initialize Icons
        lucide.createIcons();

        // State management
        let isLoginMode = true;

        // DOM Elements
        const form = document.getElementById('auth-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('toggle-password');
        const eyeIcon = document.getElementById('eye-icon');
        
        const formTitle = document.getElementById('form-title');
        const formSubtitle = document.getElementById('form-subtitle');
        const btnText = document.getElementById('btn-text');
        const toggleText = document.getElementById('toggle-text');
        const toggleModeBtn = document.getElementById('toggle-mode-btn');
        const forgotPasswordLink = document.getElementById('forgot-password-link');
        const loadingOverlay = document.getElementById('loading-overlay');

        // Toast Helper
        const showToast = (message, type = 'success') => {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').innerText = message;
            document.getElementById('toast-icon').setAttribute('data-lucide', type === 'success' ? 'check-circle' : 'alert-triangle');
            toast.className = `fixed bottom-6 right-6 z-[60] flex items-start gap-3 px-6 py-4 rounded-xl shadow-2xl slide-up ${type==='success'?'bg-emerald-600':'bg-rose-600'} text-white max-w-sm`;
            lucide.createIcons();
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('opacity-0');
                setTimeout(() => {
                    toast.classList.add('hidden');
                    toast.classList.remove('opacity-0');
                }, 300);
            }, 5000);
        };

        // Check if user is already logged in
        const checkSession = async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                // If logged in, redirect to post vacancy page
                window.location.href = 'post_vacancy.html';
            }
        };
        checkSession();

        // Toggle Password Visibility
        togglePasswordBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            eyeIcon.setAttribute('data-lucide', type === 'password' ? 'eye' : 'eye-off');
            lucide.createIcons();
        });

        // Toggle Login / Signup Mode
        toggleModeBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            
            // Animate transition
            const formContainer = document.querySelector('.p-8');
            formContainer.style.opacity = '0';
            
            setTimeout(() => {
                if (isLoginMode) {
                    formTitle.innerText = 'Welcome Back';
                    formSubtitle.innerText = 'Sign in to manage your vacancy postings';
                    btnText.innerText = 'Sign In';
                    toggleText.innerText = "Don't have an account?";
                    toggleModeBtn.innerText = 'Sign up';
                    forgotPasswordLink.classList.remove('hidden');
                } else {
                    formTitle.innerText = 'Create an Account';
                    formSubtitle.innerText = 'Sign up to start posting vacancies';
                    btnText.innerText = 'Create Account';
                    toggleText.innerText = 'Already have an account?';
                    toggleModeBtn.innerText = 'Sign in';
                    forgotPasswordLink.classList.add('hidden');
                }
                formContainer.style.opacity = '1';
                formContainer.style.transition = 'opacity 0.3s ease-in-out';
            }, 150);
        });

        // Handle Form Submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showToast("Please fill in all fields.", "error");
                return;
            }

            loadingOverlay.classList.remove('hidden');
            loadingOverlay.classList.add('flex');

            try {
                if (isLoginMode) {
                    // --- SIGN IN ---
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email: email,
                        password: password,
                    });

                    if (error) throw error;

                    showToast("Successfully signed in! Redirecting...");
                    setTimeout(() => {
                        window.location.href = 'post_vacancy.html'; // Redirect upon success
                    }, 1500);
                    
                } else {
                    // --- SIGN UP ---
                    const { data, error } = await supabase.auth.signUp({
                        email: email,
                        password: password,
                    });

                    if (error) throw error;

                    // Note: If email confirmations are enabled in Supabase settings, 
                    // user might not be immediately signed in.
                    if (data.session) {
                        showToast("Account created successfully! Redirecting...");
                        setTimeout(() => {
                            window.location.href = 'post_vacancy.html';
                        }, 1500);
                    } else {
                        showToast("Account created! Please check your email for a confirmation link.");
                        // Reset to login mode visually
                        toggleModeBtn.click();
                        passwordInput.value = '';
                    }
                }
            } catch (error) {
                console.error("Auth Error:", error);
                // Humanize common errors
                let msg = error.message;
                if (msg.includes("Invalid login credentials")) {
                    msg = "Incorrect email or password.";
                } else if (msg.includes("User already registered")) {
                    msg = "This email is already registered. Please sign in.";
                }
                showToast(msg, "error");
            } finally {
                loadingOverlay.classList.add('hidden');
                loadingOverlay.classList.remove('flex');
            }
        });
        
        // Handle Forgot Password placeholder
        forgotPasswordLink.addEventListener('click', (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            if(!email) {
                showToast("Please enter your email address first to reset password.", "error");
                emailInput.focus();
                return;
            }
            
            showToast("Password reset functionality to be implemented.", "error");
            // To implement fully: await supabase.auth.resetPasswordForEmail(email, { redirectTo: 'YOUR_URL' })
        });
    </script>
</body>
</html>
